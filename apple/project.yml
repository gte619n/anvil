name: Anvil
options:
  bundleIdPrefix: com.gte619n
  createIntermediateGroups: true
targets:
  Anvil:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/Anvil
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gte619n.anvil
        PRODUCT_NAME: Anvil
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_CFBundleDisplayName: Anvil
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        # Local, unsigned build (no Apple Developer account needed) — ad-hoc sign.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Resources/Anvil.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
