name: CodeQL

# Static analysis (SAST) for the TypeScript daemon/web client — the security surface. Runs on PRs,
# pushes to main, and weekly to catch newly-published query updates against unchanged code.
# Kotlin (Android) and Swift (Apple apps) are intentionally omitted: CodeQL can't analyze Kotlin in
# buildless mode and Swift needs a full xcodebuild/SPM compile, both of which mean standing up the
# whole toolchain (Android SDK / macOS runner) for thin WebView-shell clients. They're covered by
# review + the Phase 5 test targets; the daemon/web is where the real logic (and risk) lives.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
